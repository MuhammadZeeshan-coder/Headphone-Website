<svg viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AURA Pro wireless headphones illustration">
  <defs>
    <linearGradient id="bandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2230"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="cupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#20293a"/>
      <stop offset="55%" stop-color="#131a24"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5DD6D5"/>
      <stop offset="100%" stop-color="#18C7B8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5DD6D5" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5DD6D5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="padGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b3648"/>
      <stop offset="100%" stop-color="#151b26"/>
    </linearGradient>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0d1a2b" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ambient glow blobs -->
  <circle cx="180" cy="180" r="200" fill="url(#glow1)"/>
  <circle cx="470" cy="440" r="220" fill="url(#glow2)"/>

  <g filter="url(#softShadow)">
    <!-- headband -->
    <path d="M 148 300 C 148 150 250 70 320 70 C 390 70 492 150 492 300"
          fill="none" stroke="url(#bandGrad)" stroke-width="34" stroke-linecap="round"/>
    <path d="M 148 300 C 148 150 250 70 320 70 C 390 70 492 150 492 300"
          fill="none" stroke="url(#ringGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

    <!-- left cup -->
    <g transform="translate(148 300)">
      <ellipse cx="0" cy="60" rx="66" ry="92" fill="url(#cupGrad)"/>
      <ellipse cx="0" cy="60" rx="66" ry="92" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.55"/>
      <ellipse cx="0" cy="60" rx="44" ry="68" fill="url(#padGrad)"/>
      <circle cx="0" cy="60" r="16" fill="#0d1117" stroke="url(#ringGrad)" stroke-width="2.5"/>
    </g>

    <!-- right cup -->
    <g transform="translate(492 300)">
      <ellipse cx="0" cy="60" rx="66" ry="92" fill="url(#cupGrad)"/>
      <ellipse cx="0" cy="60" rx="66" ry="92" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.55"/>
      <ellipse cx="0" cy="60" rx="44" ry="68" fill="url(#padGrad)"/>
      <circle cx="0" cy="60" r="16" fill="#0d1117" stroke="url(#ringGrad)" stroke-width="2.5"/>
      <!-- touch surface highlight -->
      <path d="M -30 30 A 40 40 0 0 1 30 30" fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.5"/>
    </g>
  </g>

  <!-- floating accent dots -->
  <circle cx="90" cy="120" r="6" fill="#18C7B8" opacity="0.7"/>
  <circle cx="560" cy="150" r="5" fill="#38BDF8" opacity="0.6"/>
  <circle cx="560" cy="470" r="7" fill="#5DD6D5" opacity="0.5"/>
</svg>
